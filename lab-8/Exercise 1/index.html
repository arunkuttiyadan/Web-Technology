<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Student Marks Calculator</h2>

<label>Student Name:</label>
<input type="text" id="name" placeholder="Enter name">

<label>Mark 1:</label>
<input type="number" id="mark1" placeholder="Enter mark 1">

<label>Mark 2:</label>
<input type="number" id="mark2" placeholder="Enter mark 2">

<label>Mark 3:</label>
<input type="number" id="mark3" placeholder="Enter mark 3">

<button onclick="calculateMarks()">Calculate</button>

<h3 id="result"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
