<!DOCTYPE html>
<html>
<head>

<title>Online Book Finder</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.container{
width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
padding:10px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.book{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Online Book Finder</h2>

<input type="text" id="searchTitle" placeholder="Search by title">

<button onclick="searchBooks()">Search</button>

<br><br>

<select id="category">
<option value="Programming">Programming</option>
<option value="Database">Database</option>
<option value="AI">AI</option>
</select>

<button onclick="filterCategory()">Filter Category</button>

<br><br>

<button onclick="sortPrice()">Sort by Price</button>

<button onclick="sortRating()">Sort by Rating</button>

<br><br>

<button onclick="topBooks()">Top Rated Books</button>

<button onclick="nextPage()">Load More</button>

<hr>

<div id="books"></div>

</div>

<script src="script.js"></script>

</body>
</html>
